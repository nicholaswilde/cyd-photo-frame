[platformio]
default_envs = cyd_28r
test_dir = tests

[env]
monitor_speed = 115200
check_src_filters =
    +<src/>
    +<include/>
check_flags =
    cppcheck: --suppress=*:*/.pio/*
    cppcheck: --suppress=unmatchedSuppression

[cyd_base]
platform = espressif32
board = esp32dev
framework = arduino
upload_speed = 921600
check_skip_packages = yes
board_build.partitions = min_spiffs.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    PaulStoffregen/XPT2046_Touchscreen@^1.4
    ; lvgl/lvgl@^8.3.11
    bodmer/TJpg_Decoder@^1.1.0
    
build_flags =
    ; -D CORE_DEBUG_LEVEL=0
    -D USER_SETUP_LOADED=1
    -D USE_HSPI_PORT=1
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BACKLIGHT_ON=HIGH
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000
    -D LOAD_GLCD=0
    -D LOAD_FONT2=0
    -D LOAD_FONT4=0
    -D LOAD_FONT6=0
    -D LOAD_FONT7=0
    -D LOAD_FONT8=0
    -D LOAD_GFXFF=0
    -D SMOOTH_FONT=0
    -D LV_CONF_INCLUDE_SIMPLE=1
    -D LVGL_VERSION_MAJOR=8
    -D LVGL_VERSION_MINOR=4
    -D TOUCH_CS=-1
    -D SD_CS_PIN=5
    -D SD_SCK_PIN=18
    -D SD_MISO_PIN=19
    -D SD_MOSI_PIN=23
    -I include/
    -I .

[env:cyd_28r]
extends = cyd_base
build_flags =
    ${cyd_base.build_flags}
    -D ILI9341_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_BL=21
    -D XPT2046_CS=33
    -D XPT2046_IRQ=36
    -D XPT2046_MOSI=32
    -D XPT2046_MISO=39
    -D XPT2046_CLK=25

[env:cyd_35c]
extends = cyd_base
build_flags =
    ${cyd_base.build_flags}
    -D ST7796_DRIVER=1
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480
    -D TFT_BL=27

[env:native]
platform = native
test_build_src = yes
build_flags =
    -D NATIVE_TEST=1
    -D LVGL_VERSION_MAJOR=8
    -D LVGL_VERSION_MINOR=4
    -I include/
    -I tests/mocks/
    -I .
    --coverage       ; <--- Required for generating gcda/gcno files
    -lgcov           ; <--- Required for generating gcda/gcno files

; Add your source files here so the linker can find them:
build_src_filter = 
    +<file_cache.cpp>
    +<slideshow_timer.cpp>
    +<touch_manager.cpp>
    +<touch_handler.cpp>
