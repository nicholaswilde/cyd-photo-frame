---
# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  GREETING: Hello, world!

tasks:
  monitor:
    desc: Start the serial monitor
    cmds:
      - pio device monitor

  test:
    desc: Run unit tests
    cmds:
      - pio test -e native

  check:
    desc: Run static code analysis / linting
    cmds:
      - pio check

  clean:
    desc: Clean build files
    cmds:
      - pio run --target clean

  erase:
    desc: Erase the ESP32 flash memory (clears all saved settings)
    cmds:
      - pio run --target erase
  eau:
    desc: Erase and upload
    cmds:
      - pio run -t erase -t upload

  uam:
    desc: Upload and monitor
    cmds:
      - pio run -t upload -t monitor
  upload:
    desc: Upload the firmware to the ESP32 CYD board
    cmds:
      - pio run --target upload
  build:
    desc: Build the firmware
    cmds:
      - pio run
  prepare:
    desc: "Prepare and optimize images for the photo frame. Usage: task prepare -- -i <input_dir> -o <output_dir> [options]"
    cmds:
      - python3 scripts/prepare_images.py {{.CLI_ARGS}}
  default:
    cmds:
      - task -l
    silent: true
