---
# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  GREETING: Hello, world!

tasks:
  monitor:
    desc: Start the serial monitor
    cmds:
      - pio device monitor

  test:
    desc: Run unit tests
    cmds:
      - pio test -e native

  check:
    desc: Run static code analysis / linting
    cmds:
      - pio check

  clean:
    desc: Clean build files
    cmds:
      - pio run --target clean

  erase:
    desc: Erase the ESP32 flash memory (clears all saved settings)
    cmds:
      - pio run --target erase
  eau:
    desc: Erase and upload
    cmds:
      - pio run -t erase -t upload

  uam:
    desc: Upload and monitor
    cmds:
      - pio run -t upload -t monitor
  upload:
    desc: Upload the firmware to the ESP32 CYD board
    cmds:
      - pio run --target upload
  build:
    desc: Build the firmware
    cmds:
      - pio run
  foo:
    desc: Foo
    cmds:
      - echo "{{ .GREETING }}"
  default:
    cmds:
      - task -l
    silent: true
