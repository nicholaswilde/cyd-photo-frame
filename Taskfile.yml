---
# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  GREETING: Hello, world!

tasks:
  monitor:
    desc: Start the serial monitor
    cmds:
      - pio device monitor

  test:
    desc: Run unit tests
    cmds:
      - pio test -e native

  check:
    desc: Run static code analysis / linting
    cmds:
      - pio check

  clean:
    desc: Clean build files
    cmds:
      - pio run --target clean

  erase:
    desc: Erase the ESP32 flash memory (clears all saved settings)
    cmds:
      - pio run --target erase
  eau:
    desc: Erase and upload
    cmds:
      - pio run -t erase -t upload

  uam:
    desc: Upload and monitor
    cmds:
      - pio run -t upload -t monitor
  upload:
    desc: Upload the firmware to the ESP32 CYD board
    cmds:
      - pio run --target upload
  build:
    desc: Build the firmware
    cmds:
      - pio run
  prepare:
    desc: "Prepare and optimize images for the photo frame. Usage: task prepare -- -i <input_dir> -o <output_dir> [--orientation landscape|portrait|both] [--fill]"
    cmds:
      - uv run scripts/prepare_images.py {{.CLI_ARGS}}

  prepare:landscape:
    desc: "Optimise images for landscape mode (320x240). Usage: task prepare:landscape -- -i <input_dir> -o <output_dir>"
    cmds:
      - uv run scripts/prepare_images.py --orientation landscape {{.CLI_ARGS}}

  prepare:portrait:
    desc: "Optimise images for portrait mode (240x320). Usage: task prepare:portrait -- -i <input_dir> -o <output_dir>"
    cmds:
      - uv run scripts/prepare_images.py --orientation portrait {{.CLI_ARGS}}

  prepare:both:
    desc: "Optimise images for both orientations. Usage: task prepare:both -- -i <input_dir> -o <output_dir>"
    cmds:
      - uv run scripts/prepare_images.py --orientation both {{.CLI_ARGS}}

  screenshot:convert:
    desc: "Convert BMP screenshots from the SD card into PNG files. Copy .bmp files into screenshots/ first."
    cmds:
      - uv run scripts/convert_screenshots.py

  default:
    cmds:
      - task -l
    silent: true
