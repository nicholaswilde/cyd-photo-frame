# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

dotenv: ['.env']

vars:
  PIO_ENV: '{{.PIO_ENV | default "cyd_28r"}}'

tasks:
  coverage:report:
    desc: Show coverage report
    cmds:
      - task: test
        ignore_error: true
      # 2. Extract and capture raw code coverage reports
      - lcov --capture --base-directory . --directory .pio/build/native/ --output-file lcov_raw.info
      # 3. Clean up the report by filtering out system and test files
      - lcov --remove lcov_raw.info '*/.pio/*' '*/tests/*' '*/tests/mocks/*' '/usr/*' -o lcov.info --ignore-errors unused
      - lcov --list lcov.info
      - defer: rm lcov.info lcov_raw.info

  coverage:upload:
    desc: Generate and upload coverage report to Coveralls.io
    dotenv: ['.env']
    preconditions:
      - sh: 'test -n "$COVERALLS_REPO_TOKEN"'
        msg: "COVERALLS_REPO_TOKEN is not set. Please add it to your .env file."
    cmds:
      # 1. Run native tests to output coverage data
      - task: test
        ignore_error: true
      # 2. Extract and capture raw code coverage reports
      - lcov --capture --base-directory . --directory .pio/build/native/ --output-file lcov_raw.info
      # 3. Clean up the report by filtering out system and test files
      - lcov --remove lcov_raw.info '*/.pio/*' '*/tests/*' '*/tests/mocks/*' '/usr/*' -o lcov.info --ignore-errors unused
      # 4. Upload to coveralls using the CLI binary
      - coveralls report lcov.info -n -r $COVERALLS_REPO_TOKEN
      # 5. Clean up temporary local files
      - defer: rm lcov_raw.info lcov.info
    # ignore_errors: true
  monitor:
    desc: Start the serial monitor
    cmds:
      - pio device monitor

  test:
    desc: Run unit tests
    cmds:
      - pio test -e native

  check:
    desc: Run static code analysis / linting
    cmds:
      - pio check -e {{.PIO_ENV}}

  check:cyd_28r:
    desc: Run static code analysis / linting for cyd_28r
    cmds:
      - pio check -e cyd_28r

  check:cyd_35c:
    desc: Run static code analysis / linting for cyd_35c
    cmds:
      - pio check -e cyd_35c

  clean:
    desc: Clean build files
    cmds:
      - pio run -e {{.PIO_ENV}} --target clean

  clean:cyd_28r:
    desc: Clean build files for cyd_28r
    cmds:
      - pio run -e cyd_28r --target clean

  clean:cyd_35c:
    desc: Clean build files for cyd_35c
    cmds:
      - pio run -e cyd_35c --target clean

  erase:
    desc: Erase the ESP32 flash memory (clears all saved settings)
    cmds:
      - pio run -e {{.PIO_ENV}} --target erase

  erase:cyd_28r:
    desc: Erase flash memory for cyd_28r
    cmds:
      - pio run -e cyd_28r --target erase

  erase:cyd_35c:
    desc: Erase flash memory for cyd_35c
    cmds:
      - pio run -e cyd_35c --target erase

  eau:
    desc: Erase and upload
    cmds:
      - pio run -e {{.PIO_ENV}} -t erase -t upload

  eau:cyd_28r:
    desc: Erase and upload for cyd_28r
    cmds:
      - pio run -e cyd_28r -t erase -t upload

  eau:cyd_35c:
    desc: Erase and upload for cyd_35c
    cmds:
      - pio run -e cyd_35c -t erase -t upload

  uam:
    desc: Upload and monitor
    cmds:
      - pio run -e {{.PIO_ENV}} -t upload -t monitor

  uam:cyd_28r:
    desc: Upload and monitor for cyd_28r
    cmds:
      - pio run -e cyd_28r -t upload -t monitor

  uam:cyd_35c:
    desc: Upload and monitor for cyd_35c
    cmds:
      - pio run -e cyd_35c -t upload -t monitor

  upload:
    desc: Upload the firmware to the ESP32 CYD board
    cmds:
      - pio run -e {{.PIO_ENV}} --target upload

  upload:cyd_28r:
    desc: Upload firmware for cyd_28r
    cmds:
      - pio run -e cyd_28r --target upload

  upload:cyd_35c:
    desc: Upload firmware for cyd_35c
    cmds:
      - pio run -e cyd_35c --target upload

  build:
    desc: Build the firmware
    cmds:
      - pio run -e {{.PIO_ENV}}

  build:cyd_28r:
    desc: Build firmware for cyd_28r
    cmds:
      - pio run -e cyd_28r

  build:cyd_35c:
    desc: Build firmware for cyd_35c
    cmds:
      - pio run -e cyd_35c

  prepare:
    desc: "Prepare and optimize images for the photo frame. Usage: task prepare -- -i <input_dir> -o <output_dir> [--orientation landscape|portrait|both] [--fill]"
    cmds:
      - uv run scripts/prepare_images.py {{.CLI_ARGS}}

  prepare:landscape:
    desc: "Optimise images for landscape mode (320x240). Usage: task prepare:landscape -- -i <input_dir> -o <output_dir>"
    cmds:
      - uv run scripts/prepare_images.py --orientation landscape {{.CLI_ARGS}}

  prepare:portrait:
    desc: "Optimise images for portrait mode (240x320). Usage: task prepare:portrait -- -i <input_dir> -o <output_dir>"
    cmds:
      - uv run scripts/prepare_images.py --orientation portrait {{.CLI_ARGS}}

  prepare:both:
    desc: "Optimise images for both orientations. Usage: task prepare:both -- -i <input_dir> -o <output_dir>"
    cmds:
      - uv run scripts/prepare_images.py --orientation both {{.CLI_ARGS}}

  screenshot:convert:
    desc: "Convert BMP screenshots from the SD card into PNG files. Copy .bmp files into screenshots/ first."
    cmds:
      - uv run scripts/convert_screenshots.py

  default:
    cmds:
      - task -l
    silent: true
